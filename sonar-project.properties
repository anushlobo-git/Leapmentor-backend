# ── Project Identity ──────────────────────────────────────
sonar.projectKey=LeapMentor_Backend
sonar.projectName=LeapMentor Backend
sonar.projectVersion=1.0

# ── SonarQube Server ──────────────────────────────────────
sonar.host.url=http://localhost:9000
sonar.token=squ_8b41ff294d606bc5694140ec67be04095f4237ef

# ── Source Configuration ──────────────────────────────────
sonar.sources=.
sonar.language=js
sonar.sourceEncoding=UTF-8

# ── Files to Exclude from Analysis ───────────────────────
sonar.exclusions=\
  coverage/**,\
  **/__tests__/**,\
  **/*.test.js,\
  **/*.spec.js,\
  **/node_modules/**,\
  **/swagger-output.json,\
  **/swagger-autogen.js,\
  **/*.html,\
  scripts/**,\
  migrations/**,\
  mocks/**,\
  fixtures/**

# ── Files to Exclude from Duplication Detection ───────────
sonar.cpd.exclusions=\
  coverage/**,\
  **/*.test.js,\
  **/*.spec.js,\
  **/*.html,\
  models/**

# ── LCOV Coverage Report ──────────────────────────────────
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ── Files to Exclude from Coverage Calculation ───────────
sonar.coverage.exclusions=\
  server.js,\
  app.js,\
  swagger.js,\
  instrument.js,\
  migrate-mongo-config.js,\
  jest.config.js,\
  jest.setup.env.js,\
  eslint.config.js,\
  config/**,\
  scripts/**,\
  migrations/**,\
  cron/**,\
  socket/**,\
  swagger/**,\
  routes/**,\
  validations/**,\
  models/**,\
  utils/**,\
  mappers/**,\
  middleware/**,\
  **/*.test.js,\
  **/*.spec.js,\
  **/node_modules/**

# ── Test Configuration ────────────────────────────────────
sonar.tests=__tests__
sonar.test.inclusions=**/*.test.js,**/*.spec.js